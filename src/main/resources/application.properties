# ----------------------------------------
# Application Configuration
# ----------------------------------------

# Name of the Spring Boot application
spring.application.name=airBnbApp

# Port on which the embedded Tomcat server will run
# Access application at: http://localhost:1010
server.port=1010

# Enables detailed startup logs (useful for development)
# Disable in production
##########debug=true


# ----------------------------------------
# Database Configuration (PostgreSQL)
# ----------------------------------------

# Database connection URL
# Format: jdbc:postgresql://<host>:<port>/<database_name>
spring.datasource.url=${DATABASE_URL}

# Database username
spring.datasource.username=${DATABASE_USERNAME}

# Database password (currently commented)
# Uncomment if your PostgreSQL user requires a password
# spring.datasource.password=${DATABASE_PASSWORD}


# ----------------------------------------
# Hibernate / JPA Configuration
# ----------------------------------------

# Automatically updates database tables based on Entity classes
# Options: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update

# Prints executed SQL queries in the console
############spring.jpa.show-sql=true

# Formats SQL queries to make them easier to read
############spring.jpa.properties.hibernate.format_sql=true


# ----------------------------------------
# API Configuration
# ----------------------------------------

# Adds '/api/v1' before every endpoint
# Example:
# http://localhost:1010/api/v1/users
server.servlet.context-path=/api/v1


# ----------------------------------------
# JWT Configuration
# ----------------------------------------

# Secret key used to sign and verify JWT tokens
# Keep this secret and never commit a real production key to Git
jwt.secretKey=${JWT_SECRET_KEY}

# ----------------------------------------
# Frontend Configuration
# ----------------------------------------

# Base URL of the frontend application.
# Used to construct success and failure redirect URLs after payment.
frontend.url=${FRONTEND_URL}

stripe.secret.key=${STRIPE_SECRET_KEY}

stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}